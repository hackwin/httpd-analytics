<VirtualHost *:80>
    DocumentRoot "c:/wamp64/www/example.com"
    ServerName example.com
    ServerAlias www.example.com
    ServerAdmin admin@example.com
    #HostnameLookups On
    SetEnv TZ America/New_York
    LogFormat "%a %u %t %m \"%{REQUEST_URI}e\" \"%U\" \"%q\" %>s \"%h\" %I %O %D \"%f\" \"%V\" %p \"%{Referer}i\" \"%{User-agent}i\" \"%{Cookie}i\"" custom_log_format
    ErrorLog "|C:/wamp64/bin/apache/apache2.4.59/bin/rotatelogs.exe -l c:/wamp64/logs/example.com/apache.error.%Y.%m.%d.log 86400"
    CustomLog "|C:/wamp64/bin/apache/apache2.4.59/bin/rotatelogs.exe -l c:/wamp64/logs/example.com/apache.access.%Y.%m.%d.log 86400" custom_log_format
    php_admin_value error_log "c:/wamp64/logs/example.com/php.error.log"    
    php_admin_value log_errors On
    php_admin_value html_errors On
    php_admin_value display_startup_errors Off
    php_admin_value display_errors Off
    <Directory  "c:/wamp64/www/example.com/">        
        Options +Indexes +Includes +FollowSymLinks +MultiViews
        AllowOverride All
        Require all granted
        Require local
        Require ip 127.0.0.1
    </Directory>    
</VirtualHost>